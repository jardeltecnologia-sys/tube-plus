          cat > generated-android/app/src/main/java/com/jardeltecnologia/tubeplus/AudioPlayerService.java <<'EOF'
          package com.jardeltecnologia.tubeplus;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.pm.ServiceInfo;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.PowerManager;

          public class AudioPlayerService extends Service {
              public static final String ACTION_PLAY = "com.jardeltecnologia.tubeplus.PLAY";
              public static final String ACTION_STOP = "com.jardeltecnologia.tubeplus.STOP";
              public static final String EXTRA_URL = "url";
              public static final String CHANNEL_ID = "tube_plus_audio";
              private static final int NOTIFICATION_ID = 3003;
              private MediaPlayer player;
              private PowerManager.WakeLock wakeLock;

              @Override public void onCreate() {
                  super.onCreate();
                  createChannel();
              }

              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) return START_NOT_STICKY;
                  if (ACTION_STOP.equals(intent.getAction())) {
                      stopPlayback();
                      stopSelf();
                      return START_NOT_STICKY;
                  }
                  if (ACTION_PLAY.equals(intent.getAction())) {
                      String url = intent.getStringExtra(EXTRA_URL);
                      if (url != null && (url.startsWith("https://") || url.startsWith("http://"))) {
                          startForegroundCompat("Preparando áudio do vídeo...");
                          acquireWakeLock();
                          play(url);
                      }
                  }
                  return START_STICKY;
              }

              private void play(String url) {
                  stopPlayback();
                  try {
                      player = new MediaPlayer();
                      player.setAudioAttributes(new AudioAttributes.Builder()
                              .setUsage(AudioAttributes.USAGE_MEDIA)
                              .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                              .build());
                      player.setDataSource(url);
                      player.setOnPreparedListener(mp -> {
                          mp.start();
                          startForegroundCompat("Reproduzindo áudio do vídeo em segundo plano");
                      });
                      player.setOnErrorListener((mp, what, extra) -> {
                          stopPlayback();
                          stopSelf();
                          return true;
                      });
                      player.prepareAsync();
                  } catch (Exception e) {
                      stopPlayback();
                      stopSelf();
                  }
              }

              private void stopPlayback() {
                  try {
                      if (player != null) {
                          if (player.isPlaying()) player.stop();
                          player.release();
                      }
                  } catch (Exception ignored) {}
                  player = null;
                  releaseWakeLock();
                  if (Build.VERSION.SDK_INT >= 24) stopForeground(STOP_FOREGROUND_REMOVE);
                  else stopForeground(true);
              }

              private void acquireWakeLock() {
                  try {
                      if (wakeLock != null && wakeLock.isHeld()) return;
                      PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
                      if (pm != null) {
                          wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "TubePlus:VideoBgWakeLock");
                          wakeLock.setReferenceCounted(false);
                          wakeLock.acquire();
                      }
                  } catch (Exception ignored) {}
              }

              private void releaseWakeLock() {
                  try {
                      if (wakeLock != null && wakeLock.isHeld()) wakeLock.release();
                  } catch (Exception ignored) {}
                  wakeLock = null;
              }

              private void startForegroundCompat(String text) {
                  Notification notification = buildNotification(text);
                  if (Build.VERSION.SDK_INT >= 29) {
                      startForeground(NOTIFICATION_ID, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PLAYBACK);
                  } else {
                      startForeground(NOTIFICATION_ID, notification);
                  }
              }

              private Notification buildNotification(String text) {
                  Intent openIntent = new Intent(this, MainActivity.class);
                  PendingIntent openPending = PendingIntent.getActivity(this, 1, openIntent, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);

                  Intent stopIntent = new Intent(this, AudioPlayerService.class);
                  stopIntent.setAction(ACTION_STOP);
                  PendingIntent stopPending = PendingIntent.getService(this, 2, stopIntent, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);

                  Notification.Builder builder = Build.VERSION.SDK_INT >= 26
                          ? new Notification.Builder(this, CHANNEL_ID)
                          : new Notification.Builder(this);

                  builder.setSmallIcon(R.drawable.ic_stat_play)
                          .setContentTitle("Tube Plus")
                          .setContentText(text)
                          .setContentIntent(openPending)
                          .setOngoing(true)
                          .addAction(R.drawable.ic_stat_play, "Parar", stopPending);

                  if (Build.VERSION.SDK_INT < 26) builder.setPriority(Notification.PRIORITY_LOW);
                  return builder.build();
              }

              private void createChannel() {
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "Áudio em segundo plano", NotificationManager.IMPORTANCE_LOW);
                      channel.setDescription("Reprodução de mídia direta permitida pelo usuário.");
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }

              @Override public void onDestroy() {
                  stopPlayback();
                  super.onDestroy();
              }

              @Override public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > generated-android/app/src/main/java/com/jardeltecnologia/tubeplus/SleepSoundService.java <<'EOF'
          package com.jardeltecnologia.tubeplus;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.pm.ServiceInfo;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioTrack;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.PowerManager;
          import java.util.Random;

          public class SleepSoundService extends Service {
              public static final String ACTION_PLAY = "com.jardeltecnologia.tubeplus.SLEEP_PLAY";
              public static final String ACTION_STOP = "com.jardeltecnologia.tubeplus.SLEEP_STOP";
              public static final String EXTRA_SOUND = "sound";
              public static final String EXTRA_GAIN = "gain";
              public static final String EXTRA_MINUTES = "minutes";
              public static final String CHANNEL_ID = "tube_plus_sleep";
              private static final int NOTIFICATION_ID = 3010;

              private volatile boolean running = false;
              private Thread worker;
              private AudioTrack track;
              private PowerManager.WakeLock wakeLock;
              private long stopAt = 0L;

              @Override public void onCreate() {
                  super.onCreate();
                  createChannel();
              }

              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) return START_NOT_STICKY;
                  if (ACTION_STOP.equals(intent.getAction())) {
                      stopSound();
                      stopSelf();
                      return START_NOT_STICKY;
                  }
                  if (ACTION_PLAY.equals(intent.getAction())) {
                      String sound = intent.getStringExtra(EXTRA_SOUND);
                      float gain = intent.getFloatExtra(EXTRA_GAIN, 1.0f);
                      int minutes = intent.getIntExtra(EXTRA_MINUTES, 60);
                      if (sound == null) sound = "rain";
                      if (gain < 0.2f) gain = 0.2f;
                      if (gain > 3.0f) gain = 3.0f;
                      if (minutes < 0) minutes = 0;
                      if (minutes > 480) minutes = 480;
                      startForegroundCompat("Som para dormir: " + label(sound));
                      acquireWakeLock();
                      playGenerated(sound, gain, minutes);
                  }
                  return START_STICKY;
              }

              private void playGenerated(String sound, float gain, int minutes) {
                  stopSound();
                  running = true;
                  stopAt = minutes == 0 ? 0L : System.currentTimeMillis() + minutes * 60_000L;
                  final String selected = sound;
                  final float selectedGain = gain;
                  worker = new Thread(() -> runGenerator(selected, selectedGain), "TubePlusSleepGenerator");
                  worker.start();
              }

              private void runGenerator(String sound, float gain) {
                  final int sampleRate = 44100;
                  final int frames = 2048;
                  final short[] buffer = new short[frames];
                  Random random = new Random();
                  double phase1 = 0.0;
                  double phase2 = 0.0;
                  double brown = 0.0;
                  double wind = 0.0;

                  int minBuffer = AudioTrack.getMinBufferSize(sampleRate, AudioFormat.CHANNEL_OUT_MONO, AudioFormat.ENCODING_PCM_16BIT);
                  int bufferSize = Math.max(minBuffer, frames * 2);

                  try {
                      track = new AudioTrack.Builder()
                              .setAudioAttributes(new AudioAttributes.Builder()
                                      .setUsage(AudioAttributes.USAGE_MEDIA)
                                      .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                                      .build())
                              .setAudioFormat(new AudioFormat.Builder()
                                      .setSampleRate(sampleRate)
                                      .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                                      .setChannelMask(AudioFormat.CHANNEL_OUT_MONO)
                                      .build())
                              .setBufferSizeInBytes(bufferSize)
                              .setTransferMode(AudioTrack.MODE_STREAM)
                              .build();

                      track.play();

                      while (running && (stopAt == 0L || System.currentTimeMillis() < stopAt)) {
                          for (int i = 0; i < frames; i++) {
                              double noise = (random.nextDouble() * 2.0) - 1.0;
                              double sample;

                              if ("ocean".equals(sound)) {
                                  phase1 += 2.0 * Math.PI * 0.08 / sampleRate;
                                  phase2 += 2.0 * Math.PI * 0.13 / sampleRate;
                                  double swell = 0.45 + 0.35 * Math.sin(phase1) + 0.20 * Math.sin(phase2);
                                  sample = noise * swell * 0.42;
                              } else if ("wind".equals(sound)) {
                                  wind = (wind * 0.985) + (noise * 0.015);
                                  phase1 += 2.0 * Math.PI * 0.05 / sampleRate;
                                  sample = (wind * 2.2 + noise * 0.12) * (0.55 + 0.35 * Math.sin(phase1));
                              } else if ("forest".equals(sound)) {
                                  phase1 += 2.0 * Math.PI * (650 + random.nextInt(40)) / sampleRate;
                                  double chirp = random.nextDouble() > 0.997 ? Math.sin(phase1) * 0.7 : 0.0;
                                  sample = noise * 0.18 + chirp;
                              } else if ("white".equals(sound)) {
                                  sample = noise * 0.55;
                              } else if ("brown".equals(sound)) {
                                  brown = (brown + (0.025 * noise)) / 1.025;
                                  sample = brown * 3.5;
                              } else if ("fire".equals(sound)) {
                                  double crackle = random.nextDouble() > 0.985 ? noise * 0.9 : noise * 0.18;
                                  sample = crackle;
                              } else {
                                  sample = noise * 0.38; // rain
                                  if (random.nextDouble() > 0.985) sample += noise * 0.35;
                              }

                              sample *= gain;
                              if (sample > 1.0) sample = 1.0;
                              if (sample < -1.0) sample = -1.0;
                              buffer[i] = (short) (sample * 32767);
                          }
                          track.write(buffer, 0, buffer.length);
                      }
                  } catch (Exception ignored) {
                  } finally {
                      stopSound();
                      stopSelf();
                  }
              }

              private void stopSound() {
                  running = false;
                  try {
                      if (track != null) {
                          track.pause();
                          track.flush();
                          track.release();
                      }
                  } catch (Exception ignored) {}
                  track = null;
                  releaseWakeLock();
                  if (worker != null && Thread.currentThread() != worker) {
                      try { worker.interrupt(); } catch (Exception ignored) {}
                  }
                  worker = null;
                  if (Build.VERSION.SDK_INT >= 24) stopForeground(STOP_FOREGROUND_REMOVE);
                  else stopForeground(true);
              }

              private void acquireWakeLock() {
                  try {
                      if (wakeLock != null && wakeLock.isHeld()) return;
                      PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
                      if (pm != null) {
                          wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "TubePlus:SleepWakeLock");
                          wakeLock.setReferenceCounted(false);
                          wakeLock.acquire();
                      }
                  } catch (Exception ignored) {}
              }

              private void releaseWakeLock() {
                  try {
                      if (wakeLock != null && wakeLock.isHeld()) wakeLock.release();
                  } catch (Exception ignored) {}
                  wakeLock = null;
              }

              private String label(String sound) {
                  if ("ocean".equals(sound)) return "Mar";
                  if ("wind".equals(sound)) return "Vento";
                  if ("forest".equals(sound)) return "Floresta";
                  if ("white".equals(sound)) return "Ruído branco";
                  if ("brown".equals(sound)) return "Ruído marrom";
                  if ("fire".equals(sound)) return "Fogueira";
                  return "Chuva";
              }

              private void startForegroundCompat(String text) {
                  Notification notification = buildNotification(text);
                  if (Build.VERSION.SDK_INT >= 29) {
                      startForeground(NOTIFICATION_ID, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PLAYBACK);
                  } else {
                      startForeground(NOTIFICATION_ID, notification);
                  }
              }

              private Notification buildNotification(String text) {
                  Intent openIntent = new Intent(this, MainActivity.class);
                  PendingIntent openPending = PendingIntent.getActivity(this, 31, openIntent, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);

                  Intent stopIntent = new Intent(this, SleepSoundService.class);
                  stopIntent.setAction(ACTION_STOP);
                  PendingIntent stopPending = PendingIntent.getService(this, 32, stopIntent, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);

                  Notification.Builder builder = Build.VERSION.SDK_INT >= 26
                          ? new Notification.Builder(this, CHANNEL_ID)
                          : new Notification.Builder(this);

                  builder.setSmallIcon(R.drawable.ic_stat_play)
                          .setContentTitle("Tube Plus Sono Premium")
                          .setContentText(text)
                          .setContentIntent(openPending)
                          .setOngoing(true)
                          .addAction(R.drawable.ic_stat_play, "Parar", stopPending);

                  if (Build.VERSION.SDK_INT < 26) builder.setPriority(Notification.PRIORITY_LOW);
                  return builder.build();
              }

              private void createChannel() {
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "Sons para dormir", NotificationManager.IMPORTANCE_LOW);
                      channel.setDescription("Sons relaxantes em segundo plano.");
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }

              @Override public void onDestroy() {
                  stopSound();
                  super.onDestroy();
              }

              @Override public IBinder onBind(Intent intent) { return null; }
          }
          EOF

