                  bridgeScript = loadAssetText("tube_plus_bridge.js");
                  buildLayout();
                  configureWebView();
                  requestNotifications();
                  if (b != null) webView.restoreState(b); else showHome();
              }

              private void requestNotifications() {
                  if (Build.VERSION.SDK_INT >= 33 && checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 9001);
                  }
              }

              private void buildLayout() {
                  root = new FrameLayout(this);
                  root.setBackgroundColor(Color.parseColor("#050712"));

                  LinearLayout shell = new LinearLayout(this);
                  shell.setOrientation(LinearLayout.VERTICAL);
                  shell.setBackgroundColor(Color.parseColor("#050712"));

                  webView = new WebView(this);
                  webView.setVisibility(View.GONE);
                  webView.setBackgroundColor(Color.parseColor("#050712"));

                  mainPanel = new LinearLayout(this);
                  mainPanel.setOrientation(LinearLayout.VERTICAL);
                  mainPanel.setBackgroundColor(Color.parseColor("#050712"));

                  FrameLayout content = new FrameLayout(this);
                  content.addView(webView, new FrameLayout.LayoutParams(-1,-1));
                  content.addView(mainPanel, new FrameLayout.LayoutParams(-1,-1));
                  shell.addView(content, new LinearLayout.LayoutParams(-1,0,1));

                  bottomBar = makeBottomBar();
                  shell.addView(bottomBar, new LinearLayout.LayoutParams(-1,dp(62)));
                  root.addView(shell, new FrameLayout.LayoutParams(-1,-1));

                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100); progressBar.setVisibility(View.GONE);
                  FrameLayout.LayoutParams bp = new FrameLayout.LayoutParams(-1, dp(3)); bp.gravity = Gravity.TOP;
                  root.addView(progressBar, bp);

                  setContentView(root);
              }

              private LinearLayout makeBottomBar() {
                  LinearLayout nav = new LinearLayout(this);
                  nav.setOrientation(LinearLayout.HORIZONTAL);
                  nav.setGravity(Gravity.CENTER);
                  nav.setPadding(dp(3),dp(4),dp(3),dp(4));
                  nav.setBackgroundColor(Color.parseColor("#0B1020"));
                  nav.addView(tab("Início", v -> showHome()), weight());
                  nav.addView(tab("Explorar", v -> showExplore()), weight());
                  nav.addView(tab("Sono", v -> showSleep()), weight());
                  nav.addView(tab("Vídeo BG", v -> showVideoBackground()), weight());
                  nav.addView(tab("Biblioteca", v -> showLibrary()), weight());
                  return nav;
              }

              private LinearLayout.LayoutParams weight(){ return new LinearLayout.LayoutParams(0,-1,1); }

              private Button tab(String t, View.OnClickListener l){
                  Button b = new Button(this);
                  b.setText(t); b.setTextSize(10); b.setAllCaps(false); b.setTextColor(Color.WHITE);
                  b.setBackgroundColor(Color.TRANSPARENT); b.setPadding(0,0,0,0); b.setOnClickListener(l); return b;
              }

              private void setNativePanel() {
                  webView.setVisibility(View.GONE);
                  mainPanel.setVisibility(View.VISIBLE);
                  mainPanel.removeAllViews();
              }

