name: Build Tube Plus V5.1.1 APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Configurar Gradle sem cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"
          cache-disabled: true

      - name: Gerar projeto Android limpo
        run: |
          set -e
          rm -rf generated-android
          mkdir -p generated-android/app/src/main/java/com/jardeltecnologia/tubeplus
          mkdir -p generated-android/app/src/main/res/values
          mkdir -p generated-android/app/src/main/res/drawable
          mkdir -p generated-android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p generated-android/app/src/main/assets

          cat > generated-android/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'TubePlusV51APK'
          include ':app'
          EOF

          cat > generated-android/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.2.2' apply false }
          EOF

          cat > generated-android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.nonTransitiveRClass=true
          EOF

          cat > generated-android/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.jardeltecnologia.tubeplus'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.jardeltecnologia.tubeplus'
                  minSdk 23
                  targetSdk 34
                  versionCode 6
                  versionName '5.1.0'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > generated-android/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">Tube Plus</string></resources>
          EOF

          cat > generated-android/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
            <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
              <item name="android:windowNoTitle">true</item>
              <item name="android:windowActionBar">false</item>
              <item name="android:statusBarColor">#050712</item>
              <item name="android:navigationBarColor">#050712</item>
              <item name="android:windowLightStatusBar">false</item>
              <item name="android:windowLightNavigationBar">false</item>
            </style>
          </resources>
          EOF

          cat > generated-android/app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#050712"/></shape>
          EOF

          cat > generated-android/app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
