              private void setSleepGain(float gain) {
                  sleepGain = gain;
                  prefs.edit().putFloat("sleep_gain", gain).apply();
                  showSleep();
              }

              private void setSleepMinutes(int minutes) {
                  sleepMinutes = minutes;
                  prefs.edit().putInt("sleep_minutes", minutes).apply();
                  showSleep();
              }

              private void startSleep(String sound) {
                  Intent i = new Intent(this, SleepSoundService.class);
                  i.setAction(SleepSoundService.ACTION_PLAY);
                  i.putExtra(SleepSoundService.EXTRA_SOUND, sound);
                  i.putExtra(SleepSoundService.EXTRA_GAIN, sleepGain);
                  i.putExtra(SleepSoundService.EXTRA_MINUTES, sleepMinutes);
                  if (Build.VERSION.SDK_INT >= 26) startForegroundService(i); else startService(i);
              }

              private void stopSleep() {
                  Intent i = new Intent(this, SleepSoundService.class);
                  i.setAction(SleepSoundService.ACTION_STOP);
                  startService(i);
              }

              private void showVideoBackground() {
                  setNativePanel();
                  LinearLayout box = newBox();
                  box.addView(title("Vídeo BG", 28, "#FFFFFF"));
                  box.addView(label("Cole um link direto de vídeo/áudio permitido. Funciona com MP4, M3U8, MP3, AAC, rádio ou podcast.", 14, "#CBD5E1"));

                  EditText url = input("Cole link direto: MP4, M3U8, MP3, AAC...");
                  url.setSingleLine(false);
                  box.addView(url, new LinearLayout.LayoutParams(-1, dp(82)));

                  Button play = primary("Ouvir áudio do vídeo em segundo plano");
                  play.setOnClickListener(v -> startBackgroundAudio(url.getText().toString().trim(), url));
                  box.addView(play, btnParams());

                  Button stop = button("Parar áudio");
                  stop.setOnClickListener(v -> stopBackgroundAudio());
                  box.addView(stop, btnParams());

                  TextView tip = label("Páginas comuns e YouTube devem ser assistidos no player WebView. O modo BG precisa de link direto de mídia.", 12, "#94A3B8");
                  tip.setPadding(0, dp(18), 0, 0);
                  box.addView(tip);
              }

              private void showLibrary() {
                  setNativePanel();
                  LinearLayout box = newBox();
                  box.addView(title("Biblioteca", 28, "#FFFFFF"));
                  box.addView(label("Histórico local salvo apenas no próprio celular.", 14, "#CBD5E1"));
                  Set<String> hist = prefs.getStringSet("history", new LinkedHashSet<>());
                  if(hist.isEmpty()) {
                      box.addView(label("Nenhuma pesquisa ainda. Pesquise algum vídeo para aparecer aqui.", 15, "#94A3B8"));
                  } else {
                      for(String item : hist) box.addView(card(item, "Abrir novamente esta pesquisa.", v -> openSearch(((Button)v).getText().toString().split("\n")[0])), btnParamsTall());
                  }
                  box.addView(card("Limpar histórico", "Remove pesquisas salvas.", v -> { prefs.edit().remove("history").remove("last").apply(); showLibrary(); }), btnParamsTall());
              }

              private void startBackgroundAudio(String url, View view) {
                  if (url == null || url.length() < 8) return;
                  Intent i = new Intent(this, AudioPlayerService.class);
                  i.setAction(AudioPlayerService.ACTION_PLAY);
                  i.putExtra(AudioPlayerService.EXTRA_URL, url);
                  if (Build.VERSION.SDK_INT >= 26) startForegroundService(i); else startService(i);
                  hideKeyboard(view);
              }

              private void stopBackgroundAudio() {
                  Intent i = new Intent(this, AudioPlayerService.class);
                  i.setAction(AudioPlayerService.ACTION_STOP);
                  startService(i);
              }

              private void doSearch(String q, View v) {
                  if(q == null || q.trim().isEmpty()) return;
                  q = q.trim();
                  saveSearch(q);
                  openSearch(q);
                  hideKeyboard(v);
              }

              private void openSearch(String q) {
                  if(q == null || q.trim().isEmpty()) return;
                  try { openWeb("https://m.youtube.com/results?search_query=" + URLEncoder.encode(q.trim(),"UTF-8")); } catch(Exception ignored){}
              }

              private void saveSearch(String q) {
                  LinkedHashSet<String> set = new LinkedHashSet<>(prefs.getStringSet("history", new LinkedHashSet<>()));
                  set.remove(q); set.add(q);
                  while(set.size() > 8) { String first = set.iterator().next(); set.remove(first); }
                  prefs.edit().putString("last", q).putStringSet("history", set).apply();
              }

              private TextView section(String s) {
                  TextView t = title(s, 19, "#FFFFFF");
                  t.setPadding(0, dp(18), 0, dp(4));
                  return t;
              }

              private TextView title(String s, int size, String color) {
                  TextView t = new TextView(this); t.setText(s); t.setTextSize(size); t.setTextColor(Color.parseColor(color)); t.setTypeface(null,1); t.setGravity(Gravity.LEFT); return t;
              }

              private TextView label(String s, int size, String color) {
                  TextView t = new TextView(this); t.setText(s); t.setTextSize(size); t.setTextColor(Color.parseColor(color)); t.setGravity(Gravity.LEFT); return t;
              }

              private EditText input(String hint) {
                  EditText e = new EditText(this); e.setHint(hint); e.setSingleLine(true); e.setTextColor(Color.WHITE); e.setHintTextColor(0xFF94A3B8); e.setTextSize(16); e.setPadding(dp(14),0,dp(14),0); e.setBackgroundColor(Color.parseColor("#111827")); return e;
              }

              private Button primary(String text){ Button b=button(text); b.setBackgroundColor(Color.parseColor("#FF1F55")); return b; }

              private Button button(String text) {
                  Button b = new Button(this); b.setText(text); b.setAllCaps(false); b.setTextColor(Color.WHITE); b.setTextSize(15); b.setBackgroundColor(Color.parseColor("#1F2937")); return b;
              }

              private Button rowButton(String text, View.OnClickListener l) {
                  Button b = button(text);
                  b.setOnClickListener(l);
                  return b;
              }

              private Button card(String title, String desc, View.OnClickListener l) {
                  Button b = button(title + "\n" + desc); b.setGravity(Gravity.CENTER_VERTICAL|Gravity.LEFT); b.setPadding(dp(14),0,dp(14),0); b.setOnClickListener(l); return b;
              }

              private LinearLayout.LayoutParams btnParams(){ LinearLayout.LayoutParams p=new LinearLayout.LayoutParams(-1,dp(52)); p.topMargin=dp(10); return p; }
              private LinearLayout.LayoutParams btnParamsTall(){ LinearLayout.LayoutParams p=new LinearLayout.LayoutParams(-1,dp(74)); p.topMargin=dp(10); return p; }
              private LinearLayout.LayoutParams rowParams(){ LinearLayout.LayoutParams p=new LinearLayout.LayoutParams(-1,dp(44)); p.topMargin=dp(6); return p; }

              @SuppressLint("SetJavaScriptEnabled") private void configureWebView() {
                  WebSettings s=webView.getSettings();
                  s.setJavaScriptEnabled(true); s.setDomStorageEnabled(true); s.setDatabaseEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false); s.setLoadsImagesAutomatically(true);
                  s.setUseWideViewPort(true); s.setLoadWithOverviewMode(true); s.setSupportZoom(false);
                  s.setBuiltInZoomControls(false); s.setDisplayZoomControls(false); s.setAllowFileAccess(false); s.setAllowContentAccess(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT); s.setUserAgentString(UA);
                  s.setJavaScriptCanOpenWindowsAutomatically(false); s.setSupportMultipleWindows(false);
                  if(Build.VERSION.SDK_INT>=21){s.setMixedContentMode(WebSettings.MIXED_CONTENT_COMPATIBILITY_MODE); CookieManager.getInstance().setAcceptThirdPartyCookies(webView,true);}
                  CookieManager.getInstance().setAcceptCookie(true);
                  webView.setVerticalScrollBarEnabled(false); webView.setHorizontalScrollBarEnabled(false); webView.setOverScrollMode(View.OVER_SCROLL_NEVER);
                  webView.setWebViewClient(new TubeClient()); webView.setWebChromeClient(new TubeChrome());
              }

              private void openWeb(String url){ mainPanel.setVisibility(View.GONE); webView.setVisibility(View.VISIBLE); webView.loadUrl(url); }

              private class TubeClient extends WebViewClient {
                  @Override public void onPageStarted(WebView v,String u,Bitmap f){ progressBar.setVisibility(View.VISIBLE); progressBar.setProgress(8); }
                  @Override public void onPageFinished(WebView v,String u){ progressBar.setVisibility(View.GONE); injectBridge(); }
                  @Override public boolean shouldOverrideUrlLoading(WebView v,String u){ return handleUrl(u); }
                  @Override public boolean shouldOverrideUrlLoading(WebView v,WebResourceRequest r){ return handleUrl(r.getUrl().toString()); }
                  @Override public WebResourceResponse shouldInterceptRequest(WebView view, WebResourceRequest request) {
                      if (request != null && request.getUrl() != null) {
                          String url = request.getUrl().toString().toLowerCase();
                          if (shouldBlock(url)) return new WebResourceResponse("text/plain", "utf-8", new ByteArrayInputStream(new byte[0]));
                      }
                      return super.shouldInterceptRequest(view, request);
                  }

                  private boolean shouldBlock(String url) {
                      if (url.contains("youtube.com") || url.contains("youtu.be") || url.contains("googlevideo.com") || url.contains("ytimg.com") || url.contains("youtubei.googleapis.com")) return false;
                      return url.contains("doubleclick.net")
                              || url.contains("googlesyndication.com")
                              || url.contains("google-analytics.com")
                              || url.contains("googletagmanager.com")
                              || url.contains("facebook.com/tr")
                              || url.contains("connect.facebook.net")
                              || url.contains("hotjar.com")
                              || url.contains("clarity.ms")
                              || url.contains("taboola.com")
                              || url.contains("outbrain.com")
                              || url.contains("/ads?")
                              || url.contains("adsbygoogle")
                              || url.contains("pagead/");
                  }

                  private boolean handleUrl(String url){
                      if(url==null)return false; Uri uri=Uri.parse(url); String scheme=uri.getScheme()==null?"":uri.getScheme().toLowerCase();
                      if("http".equals(scheme)||"https".equals(scheme))return false;
                      try{startActivity(new Intent(Intent.ACTION_VIEW,uri));}catch(ActivityNotFoundException ignored){}
                      return true;
                  }
              }

              private class TubeChrome extends WebChromeClient {
                  @Override public void onProgressChanged(WebView v,int p){ progressBar.setProgress(p); progressBar.setVisibility(p>=100?View.GONE:View.VISIBLE); if(p>=45) injectBridge(); }
                  @Override public boolean onJsAlert(WebView v,String u,String m,JsResult r){ r.confirm(); return true; }
                  @Override public boolean onCreateWindow(WebView view, boolean isDialog, boolean isUserGesture, android.os.Message resultMsg) { return false; }
                  @Override public void onShowCustomView(View view, CustomViewCallback cb){
                      if(customView!=null){cb.onCustomViewHidden();return;}
                      customView=view; customViewCallback=cb; webView.setVisibility(View.GONE); mainPanel.setVisibility(View.GONE); bottomBar.setVisibility(View.GONE);
                      root.addView(customView,new FrameLayout.LayoutParams(-1,-1));
                  }
                  @Override public void onHideCustomView(){ hideCustomView(); }
              }

              private void hideCustomView(){
                  if(customView==null)return; root.removeView(customView); customView=null; webView.setVisibility(View.VISIBLE); bottomBar.setVisibility(View.VISIBLE);
                  if(customViewCallback!=null){customViewCallback.onCustomViewHidden(); customViewCallback=null;}
              }

              private String loadAssetText(String f){try{InputStream in=getAssets().open(f); ByteArrayOutputStream out=new ByteArrayOutputStream(); byte[] buf=new byte[4096]; int r; while((r=in.read(buf))!=-1)out.write(buf,0,r); in.close(); return new String(out.toByteArray(), StandardCharsets.UTF_8);}catch(Exception e){return "";}}
              private void injectBridge(){if(bridgeScript!=null&&!bridgeScript.isEmpty())webView.evaluateJavascript(bridgeScript,null);}
              private void hideKeyboard(View v){try{((InputMethodManager)getSystemService(Context.INPUT_METHOD_SERVICE)).hideSoftInputFromWindow(v.getWindowToken(),0);}catch(Exception ignored){}}
              private int dp(int v){return (int)(v*getResources().getDisplayMetrics().density+0.5f);}
              @Override public void onBackPressed(){ if(customView!=null)hideCustomView(); else if(webView.getVisibility()==View.VISIBLE && webView.canGoBack())webView.goBack(); else if(webView.getVisibility()==View.VISIBLE){webView.setVisibility(View.GONE); bottomBar.setVisibility(View.VISIBLE); showHome();} else super.onBackPressed();}
              @Override protected void onPause(){if(webView!=null){webView.onPause(); webView.pauseTimers();} super.onPause();}
              @Override protected void onResume(){super.onResume(); if(webView!=null){webView.resumeTimers(); webView.onResume();}}
              @Override protected void onSaveInstanceState(Bundle out){super.onSaveInstanceState(out); if(webView!=null)webView.saveState(out);}
              @Override protected void onDestroy(){ if(webView!=null){try{webView.loadUrl("about:blank"); webView.stopLoading(); webView.setWebChromeClient(null); webView.setWebViewClient(null); webView.destroy();}catch(Exception ignored){}} super.onDestroy();}
          }
          EOF

      - name: Gerar APK debug
        run: |
          cd generated-android
          gradle assembleDebug --no-daemon --stacktrace

      - name: Preparar artifact
        run: |
          mkdir -p artifacts
          cp generated-android/app/build/outputs/apk/debug/*.apk artifacts/
          ls -la artifacts

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Tube-Plus-V5-1-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error
