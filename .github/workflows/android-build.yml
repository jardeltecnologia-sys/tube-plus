                  box.addView(card("Ruído branco", "Som uniforme para mascarar barulhos.", v -> startSleep("white")), btnParamsTall());
                  box.addView(card("Ruído marrom", "Ruído mais grave e relaxante.", v -> startSleep("brown")), btnParamsTall());
